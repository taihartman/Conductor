<svg width="200" height="260" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes noteFloat { 0% { opacity: 0.7; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(-50px) rotate(12deg); } }
    @keyframes glow { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.6; } }
    @keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.9; } }
    .float { animation: float 3s ease-in-out infinite; }
    .note { animation: noteFloat 3s ease-in-out infinite; }
    .glow { animation: glow 3s ease-in-out infinite; }
    .twinkle { animation: twinkle 2s ease-in-out infinite; }
  </style>

